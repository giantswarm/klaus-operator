# Values used by app-test-suite when installing the chart on the kind smoke
# cluster. The default chart renders a ServiceMonitor (Prometheus Operator CRD)
# and an MCPServer custom resource (muster CRD); neither CRD exists on a bare
# kind cluster, so both are disabled here. The image is pinned to a released
# tag because the branch path is build+test only -- the dev image referenced
# by the packaged chart is never pushed, so the pod would hang in
# ImagePullBackOff.
serviceMonitor:
  enabled: false

image:
  tag: "0.0.92"

muster:
  registerOperator: false
