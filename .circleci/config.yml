version: 2.1

orbs:
  architect: giantswarm/architect@8.2.2

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: klaus-operator
          filters:
            tags:
              only: /^v.*/

      # Branch builds: amd64 only for faster PR feedback
      - architect/push-to-registries:
          context: architect
          multiarch: true
          name: push-to-registries
          platforms: "linux/amd64"
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
                - master

      # Tag builds: full multi-arch (amd64 + arm64). split-china-push skips
      # the Aliyun mirror; the sync-china-registry job below mirrors the image
      # from gsoci to Aliyun via the in-China galaxy-runner.
      - architect/push-to-registries:
          context: architect
          multiarch: true
          name: push-to-registries-release
          split-china-push: true
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Mirror the image gsoci -> Aliyun via the in-China runner. Runs on the
      # giantswarm/galaxy-runner resource class. Does NOT block the chart push.
      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - go-build
            - push-to-registries-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # Branch: push chart after images
      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-operator
          requires:
            - push-to-registries
          filters:
            branches:
              ignore:
                - main
                - master

      # Tag: push chart after images
      - architect/push-to-app-catalog:
          context: architect
          name: push-to-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: klaus-operator
          requires:
            - push-to-registries-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
